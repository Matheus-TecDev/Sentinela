name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend check
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências do backend
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validar importação da aplicação
        working-directory: backend
        run: |
          python -c "from app.main import app; print('Backend OK')"

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências do frontend
        working-directory: frontend
        run: npm ci

      - name: Build do frontend
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker Compose check
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Validar docker-compose
        run: docker compose config

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t sentinel-backend ./backend

      - name: Build frontend image
        run: docker build -t sentinel-frontend ./frontend

  docker-publish:
    name: Docker publish GHCR
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker, docker-build]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Login no GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build e push backend
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/sentinel-backend:latest ./backend
          docker push ghcr.io/${{ github.repository_owner }}/sentinel-backend:latest

      - name: Build e push frontend
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/sentinel-frontend:latest ./frontend
          docker push ghcr.io/${{ github.repository_owner }}/sentinel-frontend:latest