groups:
  - name: sentinel-backend
    rules:
      - alert: SentinelBackendDown
        expr: up{job="sentinel-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Sentinel backend is down
          description: Prometheus cannot scrape the Sentinel backend for 2 minutes.
      - alert: SentinelServiceAvailabilityLow
        expr: sentinel_service_availability_ratio < 0.95
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Sentinel service availability is low
          description: Service {{ $labels.service_id }} availability has been below 95% for 5 minutes.
      - alert: SentinelOpenIncidents
        expr: sentinel_open_incidents > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Sentinel has open incidents
          description: Sentinel has {{ $value }} open incidents.
      - alert: SentinelIncidentMetricMissing
        expr: absent(sentinel_open_incidents) and on() (up{job="sentinel-backend"} == 1)
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Sentinel incident metric is missing
          description: The incident metric is missing while the backend is up.
